name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tool dependencies
        shell: pwsh
        run: |
          choco install ffmpeg imagemagick --yes

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile=false

      - name: Prepare vendor tools
        shell: pwsh
        run: ./scripts/fetch-tools.ps1 -Destination "./vendor/bin"

      - name: Build bundle
        run: corepack pnpm tauri:build

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/convertit.exe